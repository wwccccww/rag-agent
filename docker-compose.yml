services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://rag:ragpass@db:5432/rag
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      API_KEY: ${API_KEY:-}
      QA_AUDIT_ENABLED: ${QA_AUDIT_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      FASTAPI_BASE_URL: http://backend:8000
      FASTAPI_API_KEY: ${FASTAPI_API_KEY:-}
    depends_on:
      - backend

volumes:
  pgdata:
